map $http_user_agent $is_preview_bot {
    default         0;
    ~*Discordbot    1;
    ~*Slackbot      1;
    ~*Twitterbot    1;
    ~*TelegramBot   1;
    ~*WhatsApp      1;
    ~*LinkedInBot   1;
    ~*facebookexternalhit 1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy — must come before the catch-all location /
    location /ws {
        proxy_pass http://gameserver:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Serve static assets with long cache
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Game room links — send link-preview bots to the gameserver for OG tags,
    # serve the SPA normally to everyone else.
    location ~ ^/game/ {
        if ($is_preview_bot) {
            proxy_pass http://gameserver:8080;
        }
        try_files $uri /index.html;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
