services:
  gameserver:
    build:
      context: .
      dockerfile: Dockerfile.server
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        BASE_URL: /shift-tac-toe/
    ports:
      - "${PORT:-5780}:80"
    restart: unless-stopped
    depends_on:
      - gameserver
